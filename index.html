<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人考勤统计系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f7;--bg2:#eaeaee;--surface:#ffffff;--surface2:#f0f0f4;--border:#d8d8de;
  --text:#1a1a2e;--text2:#6b6b80;--text3:#9e9eb0;--accent:#c49030;--accent2:#d4a853;
  --accent-bg:rgba(196,144,48,.07);--accent-b:rgba(196,144,48,.3);
  --green:#2e9e5a;--green-bg:rgba(46,158,90,.06);--green-b:rgba(46,158,90,.2);
  --orange:#d47a20;--orange-bg:rgba(212,122,32,.06);--orange-b:rgba(212,122,32,.2);
  --gold:#c49030;--gold-bg:rgba(196,144,48,.06);--gold-b:rgba(196,144,48,.2);
  --blue:#4a7de0;--blue-bg:rgba(74,125,224,.06);--blue-b:rgba(74,125,224,.2);
  --purple:#7e52c0;--purple-bg:rgba(126,82,192,.06);--purple-b:rgba(126,82,192,.2);
  --red:#d64545;--gray:#888;--gray-bg:rgba(136,136,136,.06);--gray-b:rgba(136,136,136,.18);
  --shadow:0 2px 12px rgba(0,0,0,.06);--r:12px;
  --wk-txt:#d64545;--cal-bg:#fff;
}
[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161822;--surface:#1c1f2e;--surface2:#252838;--border:#2d3048;
  --text:#e2e4ed;--text2:#9498ae;--text3:#5c6078;--accent:#d4a853;--accent2:#c49530;
  --accent-bg:rgba(212,168,83,.08);--accent-b:rgba(212,168,83,.25);
  --green:#3daa6d;--green-bg:rgba(61,170,109,.08);--green-b:rgba(61,170,109,.25);
  --orange:#e88a3a;--orange-bg:rgba(232,138,58,.08);--orange-b:rgba(232,138,58,.25);
  --gold:#d4a853;--gold-bg:rgba(212,168,83,.08);--gold-b:rgba(212,168,83,.25);
  --blue:#5b8def;--blue-bg:rgba(91,141,239,.08);--blue-b:rgba(91,141,239,.25);
  --purple:#9b6dd7;--purple-bg:rgba(155,109,215,.08);--purple-b:rgba(155,109,215,.25);
  --red:#e05252;--gray:#555;--gray-bg:rgba(85,85,85,.12);--gray-b:rgba(85,85,85,.25);
  --shadow:0 2px 16px rgba(0,0,0,.3);--wk-txt:#e05252;--cal-bg:#1c1f2e;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.hidden{display:none!important}
.theme-btn{position:fixed;bottom:20px;right:20px;z-index:9999;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.12);transition:all .3s}
.theme-btn:hover{transform:scale(1.12);border-color:var(--accent)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,var(--accent-bg),transparent 50%),radial-gradient(ellipse at 70% 80%,var(--blue-bg),transparent 50%),var(--bg);transition:background .3s}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 40px;width:420px;max-width:92vw;box-shadow:var(--shadow);transition:all .3s}
.login-card h1{font-size:24px;text-align:center;margin-bottom:6px}
.login-card .sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:28px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.fg input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border .2s,background .3s}
.fg input:focus{border-color:var(--accent)}
.btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;font-size:15px;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.5px}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.sw{text-align:center;margin-top:18px;font-size:13px;color:var(--text2)}
.sw a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:500}
.hint{text-align:center;margin-top:12px;padding:10px;background:var(--accent-bg);border:1px solid var(--accent-b);border-radius:8px;font-size:12px;color:var(--accent);animation:fadeIn .5s}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:13px;color:var(--text2)}
.remember-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.remember-row label{cursor:pointer}
.cloud-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--green-bg);border:1px solid var(--green-b);border-radius:20px;font-size:10px;color:var(--green);margin-bottom:8px;font-weight:600}
.dash{min-height:100vh}
.dash-hd{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;transition:all .3s}
.dash-hd h2{font-size:16px;font-weight:600}
.dash-hd .right{display:flex;align-items:center;gap:14px}
.dash-hd .uname{font-size:13px;color:var(--text2)}
.btn-s{padding:7px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s}
.btn-s:hover{background:var(--border)}
.btn-s[disabled]{opacity:.5;cursor:not-allowed}
.main{max-width:1400px;margin:0 auto;padding:24px 32px 48px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.st{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 28px 24px;box-shadow:var(--shadow);transition:all .3s;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0}
.st.t::before{background:var(--accent)}
.st.w::before{background:var(--orange)}
.st.e::before{background:var(--green)}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.st .vl{font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;display:flex;align-items:baseline;gap:4px}
.st .un{font-size:18px;color:var(--text2);font-weight:500}
.st .sub-info{font-size:11px;color:var(--text3);margin-top:10px}
.st.t .vl{color:var(--accent)}
.st.w .vl{color:var(--orange)}
.st.e .vl{color:var(--green)}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:20px}
.cal-nav .mo{font-size:22px;font-weight:700;min-width:220px;text-align:center}
.nb{width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:20px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.nb:hover{background:var(--surface2);border-color:var(--accent)}
.cal{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:all .3s}
.cal-hd{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
.cal-hd span{padding:14px;text-align:center;font-size:14px;font-weight:700;color:var(--text2);letter-spacing:.5px}
.cal-hd span:first-child,.cal-hd span:last-child{color:var(--wk-txt)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.c{min-height:120px;padding:10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
.c:nth-child(7n){border-right:none}
.c:hover{filter:brightness(1.05)}
.c.empty{cursor:default;background:var(--bg)!important;filter:none}
.c.today{box-shadow:inset 0 0 0 2px var(--accent)}
.c.wk{background:rgba(0,0,0,.015)}
[data-theme="dark"] .c.wk{background:rgba(255,255,255,.015)}
.c.tp-w{background:var(--green-bg);border-left:4px solid var(--green)}
.c.tp-o{background:var(--orange-bg);border-left:4px solid var(--orange)}
.c.tp-h{background:var(--gold-bg);border-left:4px solid var(--gold)}
.c.tp-a{background:var(--blue-bg);border-left:4px solid var(--blue)}
.c.tp-p{background:var(--purple-bg);border-left:4px solid var(--purple)}
.c.tp-s{background:var(--purple-bg);border-left:4px solid var(--purple)}
.c.tp-r{background:var(--gray-bg);border-left:4px solid var(--gray)}
.c .dn{font-size:18px;font-weight:700}
.c .ln{font-size:12px;color:var(--text3)}
.c .tp{font-size:11px;margin-top:6px;padding:3px 8px;border-radius:5px;display:inline-block;font-weight:600}
.c .tp.t-w{background:var(--green-b);color:var(--green)}
.c .tp.t-o{background:var(--orange-b);color:var(--orange)}
.c .tp.t-h{background:var(--gold-b);color:var(--gold)}
.c .tp.t-a{background:var(--blue-b);color:var(--blue)}
.c .tp.t-p{background:var(--purple-b);color:var(--purple)}
.c .tp.t-s{background:var(--purple-b);color:var(--purple)}
.c .tp.t-r{background:var(--gray-b);color:var(--gray)}
.c .hr{font-size:13px;color:var(--text2);margin-top:3px;font-weight:600}
.c .row1{display:flex;justify-content:space-between;align-items:flex-start}
.cal-ft{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-top:1px solid var(--border)}
.cal-ft span{padding:12px;text-align:center;font-size:13px;color:var(--text2);font-weight:600}
.legend{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:16px;font-size:13px;color:var(--text2)}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:12px;height:12px;border-radius:4px}
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mo-ct{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:480px;max-width:94vw;overflow:hidden;animation:fadeIn .2s;box-shadow:0 8px 40px rgba(0,0,0,.15)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.mo-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.mo-hd h3{font-size:17px;white-space:nowrap}
.mo-hd .dt{font-size:13px;color:var(--text2);flex:1}
.mo-x{background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;padding:0 4px;line-height:1}
.mo-x:hover{color:var(--text)}
.mo-bd{padding:24px}
.mo-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn-c{padding:9px 22px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;cursor:pointer}
.btn-c:hover{background:var(--border)}
.btn-ok{padding:9px 26px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer}
.btn-ok:hover{opacity:.9}
.fl{font-size:13px;color:var(--text2);margin-bottom:10px;font-weight:600}
.rg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.ro{position:relative}
.ro input{position:absolute;opacity:0;width:0;height:0}
.ro label{display:block;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;min-width:62px;padding:8px 4px}
.ro input:checked+label{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.ro label:hover{border-color:var(--accent)}
.hours-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:20px}
.hours-grid .ro label{display:block;text-align:center;width:100%;padding:9px 0;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.hours-grid .ro input:checked+label{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.hours-grid .ro label:hover{border-color:var(--accent)}
.adm{min-height:100vh;background:var(--bg);transition:background .3s}
.adm-hd{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;transition:all .3s}
.adm-hd h2{font-size:16px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px}
.tab{padding:7px 18px;border:none;background:none;color:var(--text2);font-size:13px;cursor:pointer;border-radius:6px;transition:all .2s}
.tab.on{background:var(--surface2);color:var(--text);font-weight:500}
.adm-main{max-width:1200px;margin:0 auto;padding:20px}
.as{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;box-shadow:var(--shadow);transition:all .3s}
.as h3{font-size:15px;margin-bottom:4px}
.as .ds{font-size:12px;color:var(--text2);margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{color:var(--text)}
.ab{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;cursor:pointer;margin-right:4px}
.ab:hover{border-color:var(--accent);color:var(--accent)}
.ab.dn:hover{border-color:var(--red);color:var(--red)}
.ab.ex{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.ab.ex:hover{opacity:.85}
.emp{text-align:center;padding:30px;color:var(--text3);font-size:13px}
.msel{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.msel select{padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){
  .stats{grid-template-columns:1fr}
  .c{min-height:90px;padding:6px}
  .c .dn{font-size:15px}
  .c .ln{font-size:10px}
  .main{padding:12px}
  .cal-hd span{font-size:12px;padding:10px 2px}
  .st .vl{font-size:36px}
  .hours-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>

<!-- LOGIN -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div style="text-align:center"><span class="cloud-badge">☁️ 云端数据同步</span></div>
    <h1>考勤统计系统</h1>
    <p class="sub">登录以管理您的考勤记录</p>
    <div id="loginHint" class="hint hidden">当前没有账号，请先 <a id="hintToReg" style="cursor:pointer;text-decoration:underline">注册新账号</a></div>
    <div style="margin-top:16px">
      <div class="fg"><label>账号</label><input type="text" id="lUser" autocomplete="username" placeholder="请输入账号（将作为邮箱使用）"></div>
      <div class="fg"><label>密码</label><input type="password" id="lPass" autocomplete="current-password" placeholder="请输入密码"></div>
      <div class="remember-row"><input type="checkbox" id="lRemember"><label for="lRemember">记住账号密码，下次自动登录</label></div>
      <button class="btn" id="btnLogin">登 录</button>
    </div>
    <p class="sw">没有账号？<a id="toReg">注册新账号</a></p>
  </div>
</div>

<!-- REGISTER -->
<div id="regView" class="login-wrap hidden">
  <div class="login-card">
    <div style="text-align:center"><span class="cloud-badge">☁️ 云端数据同步</span></div>
    <h1>注册新账号</h1>
    <p class="sub">填写信息创建您的账号</p>
    <div class="fg"><label>账号</label><input type="text" id="rUser" autocomplete="username" placeholder="请输入账号（将作为登录邮箱）"></div>
    <div class="fg"><label>密码</label><input type="password" id="rPass" autocomplete="new-password" placeholder="请输入密码（至少6位）"></div>
    <div class="fg"><label>姓名</label><input type="text" id="rName" placeholder="请输入姓名"></div>
    <button class="btn" id="btnReg">注 册</button>
    <p class="sw">已有账号？<a id="toLogin">返回登录</a></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView" class="dash hidden">
  <header class="dash-hd">
    <h2>📊 考勤管理系统</h2>
    <div class="right">
      <span class="uname" id="dashName"></span>
      <button class="btn-s" id="btnLogout">退出登录</button>
    </div>
  </header>
  <div class="main">
    <div class="stats">
      <div class="st t">
        <div class="lb">当月总工时</div>
        <div class="vl"><span id="sT">0</span><span class="un">h</span></div>
        <div class="sub-info" id="sTD">本月累计工作时长</div>
      </div>
      <div class="st w">
        <div class="lb">平时加班</div>
        <div class="vl"><span id="sW">0</span><span class="un">h</span></div>
        <div class="sub-info" id="sWD">工作日超出8h的部分</div>
      </div>
      <div class="st e">
        <div class="lb">周末加班</div>
        <div class="vl"><span id="sE">0</span><span class="un">h</span></div>
        <div class="sub-info" id="sED">周六日全部工时</div>
      </div>
    </div>
    <div class="cal-nav">
      <button class="nb" id="prevM">◂</button>
      <span class="mo" id="moDisp"></span>
      <button class="nb" id="nextM">▸</button>
    </div>
    <div class="cal" id="calBox"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>正常上班</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>加班</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>法休</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>年假</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>事假/病假</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gray)"></div>休息</div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-s" id="btnExport" style="padding:10px 28px;font-size:13px">📥 导出本月考勤 (Excel)</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminView" class="adm hidden">
  <header class="adm-hd">
    <h2>⚙️ 超级管理员后台</h2>
    <button class="btn-s" id="btnALogout">退出登录</button>
  </header>
  <div class="adm-main">
    <div class="tabs" id="adminTabs">
      <button class="tab on" data-t="u">账号管理</button>
      <button class="tab" data-t="a">考勤查看</button>
    </div>
    <div id="aUsers" class="as" style="margin-top:16px">
      <h3>用户列表</h3>
      <p class="ds">管理所有注册用户的账号信息</p>
      <div id="uTbl"></div>
    </div>
    <div id="aAtt" class="as hidden" style="margin-top:16px">
      <h3>考勤记录</h3>
      <p class="ds">查看所有用户的考勤数据</p>
      <div class="msel">
        <select id="aYear"></select><span style="color:var(--text2)">年</span>
        <select id="aMonth"></select><span style="color:var(--text2)">月</span>
        <button class="btn-s" id="btnAShow">查看</button>

function leapMonth(y){return LT[y-1900]&0xf}
function leapDays(y){return leapMonth(y)?(LT[y-1900]&0x10000?30:29):0}
function monthDays(y,m){return(LT[y-1900]&(0x10000>>m))?30:29}
function solar2lunar(yy,mm,dd){
  if(yy<1900||yy>2100)return null;
  var off=Math.round((new Date(yy,mm-1,dd)-new Date(1900,0,31))/864e5);
  var y=1900,m,leap=false,d;
  while(y<2101){var dy=lYearDays(y);if(off<dy)break;off-=dy;y++}
  var lm=leapMonth(y);
  for(m=1;m<13;m++){
    if(lm>0&&m===(lm+1)&&!leap){--m;leap=true;var ld=leapDays(y);if(off<ld){d=off+1;off=0;break}off-=ld}
    var md=monthDays(y,m);if(off<md){d=off+1;off=0;break}off-=md;
    if(leap&&m===(lm+1))leap=false;
  }
  return{year:y,month:m,day:d,leap:leap}
}

// 注册（云端）
async function cloudRegister(username, password, displayName){
  if(!CLOUD_MODE) return {error:'未配置云端'};
  var email = username+'@attendance.app';
  var {data,error} = await SB.auth.signUp({
    email: email,
    password: password,
    options: {data:{display_name:displayName,username:username}}
  });
  if(error) return {error:error.message};
  // 更新 profile 中的 username
  if(data.user){
    await SB.from('profiles').update({username:username,display_name:displayName}).eq('id',data.user.id);
  }
  return {data:data};
}

// 登录（云端）
async function cloudLogin(username, password){
  if(!CLOUD_MODE) return {error:'未配置云端'};
  var email = username+'@attendance.app';
  var {data,error} = await SB.auth.signInWithPassword({email:email,password:password});
  if(error) return {error:error.message};
  // 获取 profile
  var {data:profile} = await SB.from('profiles').select('*').eq('id',data.user.id).single();
  var isAdminUser = ADMIN_EMAILS.indexOf(data.user.email)>=0;
  var user = {
    id: data.user.id,
    username: profile?profile.username:username,
    name: profile?profile.display_name:username,
    role: isAdminUser?'admin':(profile?profile.role:'user')
  };
  return {user:user};
}

// 加载考勤（云端）
async function cloudLoadAtt(userId, year, month){
  if(!CLOUD_MODE) return null;
  var startDate = year+'-'+String(month).padStart(2,'0')+'-01';
  var endDate = year+'-'+String(month).padStart(2,'0')+'-31';
  var {data,error} = await SB.from('attendance')
    .select('*')
    .eq('user_id',userId)
    .gte('record_date',startDate)
    .lte('record_date',endDate);
  if(error){console.error(error);return null}
  var result = {};
  if(data){
    data.forEach(function(r){
      var parts = r.record_date.split('-');
      var key = parseInt(parts[0])+'-'+parseInt(parts[1])+'-'+parseInt(parts[2]);
      result[key] = {type:r.work_type,hours:parseFloat(r.hours)};
    });
  }
  return result;
}

// 保存考勤（云端）
async function cloudSaveAtt(userId, year, month, day, type, hours){
  if(!CLOUD_MODE) return;
  var dateStr = year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  await SB.from('attendance').upsert({
    user_id:userId,
    record_date:dateStr,
    work_type:type,
    hours:hours,
    updated_at:new Date().toISOString()
  },{onConflict:'user_id,record_date'});
}

  return data.filter(function(u){return u.role!=='admin'}).map(function(u){
    return {id:u.id,username:u.username,name:u.display_name,role:u.role};
  });
}

    .select('*,profiles(username,display_name)')
    .gte('record_date',startDate)
    .lte('record_date',endDate);
  if(error||!data) return {};
  var result = {};
  data.forEach(function(r){
    if(!result[r.user_id]) result[r.user_id]={};

  });

      if(!found){btn.disabled=false;btn.textContent='登 录';alert('账号或密码错误');return}

    }

  if(isAdmin){showV('admin');renderAdmin()}

async function doReg(){
  var u=document.getElementById('rUser').value.trim();
  var p=document.getElementById('rPass').value;
  var n=document.getElementById('rName').value.trim();
  if(!u||!p||!n){alert('请填写所有信息');return}
  if(p.length<6){alert('密码至少需要6位');return}

  var btn=document.getElementById('btnReg');
  btn.disabled=true;btn.textContent='注册中...';

  if(CLOUD_MODE){
    var result = await cloudRegister(u,p,n);
    btn.disabled=false;btn.textContent='注 册';
    if(result.error){alert('注册失败: '+result.error);return}
    alert('注册成功！请登录');
  }else{
    var users=JSON.parse(localStorage.getItem('att_local_users')||'[]');
    for(var i=0;i<users.length;i++){if(users[i].username===u){btn.disabled=false;btn.textContent='注 册';alert('账号已存在');return}}
    users.push({id:'u'+Date.now(),username:u,password:p,name:n,role:'user'});
    localStorage.setItem('att_local_users',JSON.stringify(users));
    btn.disabled=false;btn.textContent='注 册';
    alert('注册成功！请登录');
  }

  document.getElementById('lUser').value=u;
  document.getElementById('lPass').value=p;
  document.getElementById('rUser').value='';
  document.getElementById('rPass').value='';
  document.getElementById('rName').value='';

}

    if(cloudData){
      var local=loadLocalAtt();
      if(!local[curUser.id])local[curUser.id]={};
      // Merge cloud data into local
      var ymKey=vYear+'-'+vMonth;
      for(var k in cloudData){
        local[curUser.id][k]=cloudData[k];
      }
      saveLocalAtt(local);
    }
  }
  renderCal();calcStats();
}

function renderCal(){
  var fd=new Date(vYear,vMonth-1,1).getDay();
  var td=new Date(vYear,vMonth,0).getDate();
  var ud;
  if(CLOUD_MODE){
    var local=loadLocalAtt();ud=local[curUser.id]||{};
  }else{
    var local=loadLocalAtt();ud=local[curUser.id]||{};
  }
  var today=new Date();
  var isCM=(vYear===today.getFullYear()&&vMonth===today.getMonth()+1);
  var h='<div class="cal-hd">';
  ['日','一','二','三','四','五','六'].forEach(function(d){h+='<span>'+d+'</span>'});
  h+='</div><div class="cal-grid">';
  for(var i=0;i<fd;i++)h+='<div class="c empty"></div>';
  for(var d=1;d<=td;d++){
    var k=vYear+'-'+vMonth+'-'+d,rec=ud[k];
    var dw=new Date(vYear,vMonth-1,d).getDay();
    var isWk=(dw===0||dw===6);
    var isT=(isCM&&d===today.getDate());
    var lun=solar2lunar(vYear,vMonth,d),ls=lunarShort(lun);
    var defT=getDefType(vYear,vMonth,d);
    var tp=rec?rec.type:defT,hr=rec?rec.hours:0;
    var cls='c';
    if(isWk)cls+=' wk';
    if(isT)cls+=' today';
    var tc='t-w';
    if(rec){
      if(tp==='上班'){cls+=hr>8?' tp-o':' tp-w';tc=hr>8?'t-o':'t-w'}
      else if(tp==='法休'){cls+=' tp-h';tc='t-h'}
      else if(tp==='年假'){cls+=' tp-a';tc='t-a'}
      else if(tp==='事假'){cls+=' tp-p';tc='t-p'}
      else if(tp==='病假'){cls+=' tp-s';tc='t-s'}
      else if(tp==='休息'){cls+=' tp-r';tc='t-r'}
    }else{
      if(defT==='休息'){cls+=' tp-r';tc='t-r'}
      else if(defT==='法休'){cls+=' tp-h';tc='t-h'}
    }
    h+='<div class="'+cls+'" onclick="openModal('+d+')">';
    h+='<div class="row1"><span class="dn">'+d+'</span><span class="ln">'+ls+'</span></div>';
    h+='<div class="tp '+tc+'">'+tp+'</div>';
    if(hr)h+='<div class="hr">'+hr+'h</div>';
    h+='</div>';
  }
  var rem=(fd+td)%7;
  if(rem)for(var i=0;i<7-rem;i++)h+='<div class="c empty"></div>';
  h+='</div>';
  var ftd=new Date(vYear,vMonth,0).getDate();
  h+='<div class="cal-ft">';
  for(var col=0;col<7;col++){
    var sum=0;
    for(var dd=1;dd<=ftd;dd++){
      if(new Date(vYear,vMonth-1,dd).getDay()===col){
        var kk=vYear+'-'+vMonth+'-'+dd,rrec=ud[kk];
        if(rrec&&rrec.hours)sum+=rrec.hours;
      }
    }
    h+='<span>'+(sum?sum+'h':'-')+'</span>';
  }
  h+='</div>';
  document.getElementById('calBox').innerHTML=h;
}

function calcStats(){
  var local=loadLocalAtt(),ud=local[curUser.id]||{},td=new Date(vYear,vMonth,0).getDate();
  var tot=0,wOT=0,eOT=0,wDays=0,eDays=0;
  for(var d=1;d<=td;d++){
    var k=vYear+'-'+vMonth+'-'+d,rec=ud[k];
    if(!rec||!rec.hours)continue;
    var dw=new Date(vYear,vMonth-1,d).getDay(),isWk=(dw===0||dw===6);
    tot+=rec.hours;
    if(rec.type==='上班'){
      if(isWk){eOT+=rec.hours;eDays++}
      else{if(rec.hours>8){wOT+=(rec.hours-8)}wDays++}
    }else if(rec.type==='法休'&&rec.hours){
      if(isWk){eOT+=rec.hours;eDays++}
    }
  }
  document.getElementById('sT').textContent=tot;
  document.getElementById('sW').textContent=wOT;
  document.getElementById('sE').textContent=eOT;
  document.getElementById('sTD').textContent='已记录 '+wDays+' 个工作日 + '+eDays+' 个休息日';
  document.getElementById('sWD').textContent=wOT>0?'折合约 '+wOT+' 小时额外收入':'工作日超出8h的部分';
  document.getElementById('sED').textContent=eOT>0?'共 '+eDays+' 天周末加班':'周六日全部工时';
}

// ===================== MODAL =====================
function buildHours(){
  var c=document.getElementById('mHours'),h='';
  for(var i=1;i<=22;i++){
    var v=i*0.5,id='h'+i;
    var lb=(v%1===0)?v+'h':v+'h';
    h+='<div class="ro"><input type="radio" name="ahours" value="'+v+'" id="'+id+'"'+(v===8?' checked':'')+'><label for="'+id+'">'+lb+'</label></div>';
  }
  c.innerHTML=h;
}

function openModal(d){
  selDate=d;
  var lun=solar2lunar(vYear,vMonth,d);
  var dow=['日','一','二','三','四','五','六'][new Date(vYear,vMonth-1,d).getDay()];
  document.getElementById('mDate').textContent=vYear+'年'+vMonth+'月'+d+'日 星期'+dow+'  '+lunarStr(lun);
  var local=loadLocalAtt(),ud=local[curUser.id]||{},k=vYear+'-'+vMonth+'-'+d,rec=ud[k];
  document.querySelectorAll('input[name="atype"]').forEach(function(r){r.checked=(r.value===(rec?rec.type:'上班'))});
  document.querySelectorAll('input[name="ahours"]').forEach(function(r){r.checked=rec?parseFloat(r.value)===rec.hours:parseFloat(r.value)===8});
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){document.getElementById('modal').classList.add('hidden');selDate=null}

async function saveAtt(){
  if(!selDate)return;
  var tp=document.querySelector('input[name="atype"]:checked').value;
  var hr=parseFloat(document.querySelector('input[name="ahours"]:checked').value);

  // Save to local
  var local=loadLocalAtt();
  if(!local[curUser.id])local[curUser.id]={};
  local[curUser.id][vYear+'-'+vMonth+'-'+selDate]={type:tp,hours:hr};
  saveLocalAtt(local);

  // Save to cloud
  if(CLOUD_MODE&&curUser.id){
    await cloudSaveAtt(curUser.id, vYear, vMonth, selDate, tp, hr);
  }

  closeModal();renderCal();calcStats();
}

// ===================== ADMIN =====================
async function renderAdmin(){
  document.getElementById('uTbl').innerHTML='<div class="loading">加载用户列表</div>';
  var users;
  if(CLOUD_MODE){
    users = await cloudLoadUsers();
  }else{
    users = JSON.parse(localStorage.getItem('att_local_users')||'[]').filter(function(u){return u.role!=='admin'});
  }
  renderUTblWithData(users);
}

function renderUTblWithData(users){
  if(!users||!users.length){document.getElementById('uTbl').innerHTML='<div class="emp">暂无注册用户</div>';return}
  var h='<table><thead><tr><th>账号</th><th>姓名</th><th>操作</th></tr></thead><tbody>';
  users.forEach(function(u){
    h+='<tr><td>'+u.username+'</td><td>'+u.name+'</td><td>';
    if(!CLOUD_MODE){
      h+='<button class="ab" onclick="chgPW(\''+u.id+'\')">修改密码</button>';
      h+='<button class="ab" onclick="chgUN(\''+u.id+'\')">修改账号</button>';
    }
    h+='<button class="ab dn" onclick="delU(\''+u.id+'\')">删除</button></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('uTbl').innerHTML=h;
}

function chgPW(id){var np=prompt('输入新密码：');if(!np)return;var users=JSON.parse(localStorage.getItem('att_local_users')||'[]');for(var i=0;i<users.length;i++){if(users[i].id===id){users[i].password=np;localStorage.setItem('att_local_users',JSON.stringify(users));alert('密码已更新');return}}}
function chgUN(id){var nu=prompt('输入新账号：');if(!nu)return;var users=JSON.parse(localStorage.getItem('att_local_users')||'[]');for(var i=0;i<users.length;i++){if(users[i].username===nu&&users[i].id!==id){alert('账号已存在');return}}for(var i=0;i<users.length;i++){if(users[i].id===id){users[i].username=nu;localStorage.setItem('att_local_users',JSON.stringify(users));alert('账号已更新');renderAdmin();return}}}

async function delU(id){
  if(!confirm('确定删除该用户？'))return;
  if(CLOUD_MODE){
    await cloudDeleteUser(id);
  }else{
    var users=JSON.parse(localStorage.getItem('att_local_users')||'[]');
    localStorage.setItem('att_local_users',JSON.stringify(users.filter(function(x){return x.id!==id})));
    var att=loadLocalAtt();delete att[id];saveLocalAtt(att);
  }
  renderAdmin();
}

async function renderAAtt(){
  var y=parseInt(document.getElementById('aYear').value),m=parseInt(document.getElementById('aMonth').value);
  document.getElementById('aAttTbl').innerHTML='<div class="loading">加载考勤数据</div>';

  var users, allAtt;
  if(CLOUD_MODE){
    users = await cloudLoadUsers();
    allAtt = await cloudLoadAllAtt(y,m);
  }else{
    users = JSON.parse(localStorage.getItem('att_local_users')||'[]').filter(function(u){return u.role!=='admin'});
    allAtt = loadLocalAtt();
  }

  var td=new Date(y,m,0).getDate();
  if(!users||!users.length){document.getElementById('aAttTbl').innerHTML='<div class="emp">暂无用户数据</div>';return}
  var h='<table style="font-size:11px"><thead><tr><th style="min-width:70px">用户</th>';
  for(var d=1;d<=td;d++){var dow=['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];h+='<th style="min-width:50px">'+d+'<br><span style="color:var(--text3);font-size:9px">'+dow+'</span></th>'}
  h+='<th>总工时</th></tr></thead><tbody>';
  users.forEach(function(u){
    var ud=CLOUD_MODE?(allAtt[u.id]||{}):(allAtt[u.id]||{});
    var total=0;
    h+='<tr><td><strong>'+u.name+'</strong><br><span style="color:var(--text3);font-size:10px">'+u.username+'</span></td>';
    for(var d=1;d<=td;d++){
      var k=y+'-'+m+'-'+d,rec=ud[k];
      if(rec){total+=rec.hours;var tc=rec.type==='上班'&&rec.hours>8?'var(--orange)':'var(--text)';h+='<td style="color:'+tc+'">'+rec.type+'<br>'+rec.hours+'h</td>'}
      else{h+='<td style="color:var(--text3)">'+getDefType(y,m,d)+'</td>'}
    }
    h+='<td><strong>'+total+'h</strong></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('aAttTbl').innerHTML=h;
}

// ===================== EXPORT =====================
function exportXlsx(){
  if(typeof XLSX==='undefined'){alert('导出库加载中，请稍后重试');return}
  var local=loadLocalAtt(),ud=local[curUser.id]||{},td=new Date(vYear,vMonth,0).getDate();
  var data=[['日期','星期','农历','上班类型','上班时长(h)']];
  for(var d=1;d<=td;d++){
    var k=vYear+'-'+vMonth+'-'+d,rec=ud[k];
    var dow=['日','一','二','三','四','五','六'][new Date(vYear,vMonth-1,d).getDay()];
    var lun=solar2lunar(vYear,vMonth,d),def=getDefType(vYear,vMonth,d);
    data.push([vYear+'-'+String(vMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0'),'星期'+dow,lunarStr(lun),rec?rec.type:def,rec?rec.hours:0]);
  }
  var ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'考勤');
  XLSX.writeFile(wb,curUser.name+'_'+vYear+'年'+vMonth+'月_考勤.xlsx');
}

async function exportAdminXlsx(){
  if(typeof XLSX==='undefined'){alert('导出库加载中，请稍后重试');return}
  var y=parseInt(document.getElementById('aYear').value),m=parseInt(document.getElementById('aMonth').value);
  var users,allAtt;
  if(CLOUD_MODE){
    users=await cloudLoadUsers();
    allAtt=await cloudLoadAllAtt(y,m);
  }else{
    users=JSON.parse(localStorage.getItem('att_local_users')||'[]').filter(function(u){return u.role!=='admin'});
    allAtt=loadLocalAtt();
  }
  var td=new Date(y,m,0).getDate();
  var data=[['姓名','账号']];
  for(var d=1;d<=td;d++)data[0].push(d+'日');
  data[0].push('总工时');
  (users||[]).forEach(function(u){
    var ud=allAtt[u.id]||{},row=[u.name,u.username],total=0;
    for(var d=1;d<=td;d++){var k=y+'-'+m+'-'+d,rec=ud[k];if(rec){row.push(rec.type+' '+rec.hours+'h');total+=rec.hours}else row.push(getDefType(y,m,d))}
    row.push(total+'h');data.push(row);
  });
  var ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'考勤汇总');
  XLSX.writeFile(wb,'考勤汇总_'+y+'年'+m+'月.xlsx');
}
